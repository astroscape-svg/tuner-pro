<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musical Analyzer for ヨダタケシ</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .main-display { font-size: 4rem; font-weight: bold; margin: 20px 0; color: #00ffcc; text-shadow: 0 0 15px rgba(0,255,204,0.3); height: 1.2em; }
        .sub-display { font-size: 1.5rem; color: #aaa; margin-bottom: 20px; height: 1.5em; }
        
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { padding: 10px 20px; border: 1px solid #444; background: #333; color: #fff; border-radius: 5px; cursor: pointer; }
        .mode-btn.active { background: #007aff; border-color: #007aff; }

        canvas { background: #000; border-radius: 8px; width: 100%; max-width: 500px; height: 120px; }
        .controls { margin-top: 30px; display: flex; gap: 15px; }
        button.action { padding: 15px 30px; font-size: 1rem; cursor: pointer; border: none; border-radius: 30px; color: white; font-weight: bold; }
        #startBtn { background: #28a745; }
        #stopBtn { background: #dc3545; display: none; }
    </style>
</head>
<body>

    <div class="mode-selector">
        <button id="singleMode" class="mode-btn active">単音 (チューナー)</button>
        <button id="chordMode" class="mode-btn">コード解析</button>
    </div>

    <div class="main-display" id="primary-out">---</div>
    <div class="sub-display" id="secondary-out">準備完了</div>
    
    <canvas id="visualizer"></canvas>
    
    <div class="controls">
        <button id="startBtn" class="action">解析開始</button>
        <button id="stopBtn" class="action">解析終了</button>
    </div>

    <script>
        let audioCtx, analyser, source, animationId;
        let currentMode = 'single'; // 'single' or 'chord'

        const primaryOut = document.getElementById('primary-out');
        const secondaryOut = document.getElementById('secondary-out');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
        const chordPatterns = [
            { name: "Maj", intervals: [0, 4, 7] },
            { name: "Min", intervals: [0, 3, 7] },
            { name: "Maj7", intervals: [0, 4, 7, 11] },
            { name: "7", intervals: [0, 4, 7, 10] },
            { name: "m7", intervals: [0, 3, 7, 10] }
        ];

        // モード切替
        document.getElementById('singleMode').onclick = (e) => {
            currentMode = 'single';
            updateModeUI(e.target);
        };
        document.getElementById('chordMode').onclick = (e) => {
            currentMode = 'chord';
            updateModeUI(e.target);
        };

        function updateModeUI(activeBtn) {
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            activeBtn.classList.add('active');
            primaryOut.textContent = "---";
        }

        startBtn.onclick = async () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            source.connect(analyser);

            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline-block';
            secondaryOut.textContent = "解析中...";
            loop();
        };

        stopBtn.onclick = () => {
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
            cancelAnimationFrame(animationId);
            startBtn.style.display = 'inline-block';
            stopBtn.style.display = 'none';
            primaryOut.textContent = "---";
            secondaryOut.textContent = "停止中";
        };

        function loop() {
            animationId = requestAnimationFrame(loop);
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            const floatData = new Float32Array(analyser.fftSize);
            analyser.getByteFrequencyData(dataArray);
            analyser.getFloatTimeDomainData(floatData);

            drawWave(dataArray);

            if (currentMode === 'single') {
                const pitch = autoCorrelate(floatData, audioCtx.sampleRate);
                if (pitch !== -1) {
                    const noteNum = 12 * (Math.log2(pitch / 440)) + 69;
                    primaryOut.textContent = noteNames[Math.round(noteNum) % 12];
                    secondaryOut.textContent = Math.round(pitch) + " Hz";
                }
            } else {
                runChordAnalysis(dataArray);
            }
        }

        function runChordAnalysis(dataArray) {
            let chroma = new Float32Array(12).fill(0);
            for (let i = 0; i < dataArray.length; i++) {
                const freq = i * audioCtx.sampleRate / analyser.fftSize;
                if (freq > 80 && freq < 2000) {
                    const noteNum = 12 * (Math.log2(freq / 440)) + 69;
                    chroma[Math.round(noteNum) % 12] += dataArray[i];
                }
            }
            let activeNotes = [];
            const maxVal = Math.max(...chroma);
            if (maxVal > 50) {
                chroma.forEach((v, i) => { if (v > maxVal * 0.7) activeNotes.push(i); });
            }

            if (activeNotes.length >= 3) {
                primaryOut.textContent = identifyChord(activeNotes);
                secondaryOut.textContent = activeNotes.map(n => noteNames[n]).join(", ");
            }
        }

        function identifyChord(notes) {
            for (let root of notes) {
                const relative = notes.map(n => (n - root + 12) % 12);
                for (let p of chordPatterns) {
                    if (p.intervals.every(i => relative.includes(i))) return noteNames[root] + p.name;
                }
            }
            return "Searching...";
        }

        function autoCorrelate(buf, sampleRate) {
            let rms = 0;
            for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
            if (Math.sqrt(rms / buf.length) < 0.01) return -1;
            let r1 = 0, r2 = buf.length - 1, thres = 0.2;
            for (let i = 0; i < buf.length / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
            for (let i = 1; i < buf.length / 2; i++) if (Math.abs(buf[buf.length - i]) < thres) { r2 = buf.length - i; break; }
            let buf2 = buf.slice(r1, r2);
            let c = new Array(buf2.length).fill(0);
            for (let i = 0; i < buf2.length; i++)
                for (let j = 0; j < buf2.length - i; j++) c[i] = c[i] + buf2[j] * buf2[j + i];
            let d = 0; while (c[d] > c[d + 1]) d++;
            let maxval = -1, maxpos = -1;
            for (let i = d; i < buf2.length; i++) if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
            return sampleRate / maxpos;
        }

        function drawWave(dataArray) {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let x = 0;
            for (let i = 0; i < dataArray.length / 2; i++) {
                const barHeight = dataArray[i] / 2;
                ctx.fillStyle = `hsl(${(i / dataArray.length) * 360}, 100%, 50%)`;
                ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
    </script>
</body>
</html>
